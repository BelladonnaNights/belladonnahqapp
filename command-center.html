<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belladonna Command Center</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Josefin+Sans:wght@200;300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#08060a;--surface:#13101a;--surface2:#1a1525;--surface3:#211c2e;
  --border:rgba(155,106,191,0.18);--border2:rgba(155,106,191,0.38);--border-gold:rgba(201,168,76,0.35);
  --gold:#c9a84c;--gold-dim:rgba(201,168,76,0.12);
  --purple:#9b6abf;--purple2:#7a4a9a;--purple-dim:rgba(155,106,191,0.1);
  --rose:#a03858;--teal:#2a8870;--live:#3a9a5a;--live-dim:rgba(58,154,90,0.12);
  --text:#f0eaf8;--text2:#b8a8d0;--text3:#6a5a80;--text4:#3a2a50;
  --purple-btn:#c8b0e8;
}
body{background:var(--bg);color:var(--text);font-family:'Josefin Sans',sans-serif;font-weight:300;min-height:100vh;letter-spacing:0.04em;overflow-x:hidden;}

/* HEADER */
.header{background:linear-gradient(180deg,#060408 0%,var(--bg) 100%);border-bottom:2px solid rgba(155,106,191,0.25);padding:1.2rem 1.5rem;position:relative;}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--purple2),var(--gold),var(--purple),transparent);}
.header-top{display:flex;align-items:center;justify-content:space-between;}
.logo-group{display:flex;align-items:center;gap:0.8rem;}
.logo-img{width:44px;height:44px;object-fit:contain;opacity:0.95;flex-shrink:0;}
.logo{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;letter-spacing:0.15em;color:var(--gold);text-transform:uppercase;}
.logo small{color:var(--text3);font-size:0.98rem;display:block;letter-spacing:0.35em;font-family:'Josefin Sans',sans-serif;font-weight:200;margin-top:-2px;}
.hq-link{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);text-decoration:none;border:1px solid var(--border);padding:0.4rem 0.9rem;transition:all 0.2s;}
.hq-link:hover{border-color:var(--border-gold);color:var(--gold);}

/* HOME */
#homeScreen{display:flex;flex-direction:column;height:calc(100vh - 76px);overflow:hidden;}
.home-top{padding:0.9rem 1.5rem 0.5rem;flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.greeting-text{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;color:var(--gold);letter-spacing:0.12em;}
.greeting-sub{font-size:0.56rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--text3);margin-top:0.12rem;}
.focus-badge{font-size:0.56rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--rose);border:1px solid rgba(160,56,88,0.3);padding:0.28rem 0.7rem;white-space:nowrap;flex-shrink:0;margin-top:0.3rem;}
.focus-badge span{color:var(--text2);}

/* WEEK FOCUS WIDGET on home */
.week-widget{padding:0 1.5rem 0.5rem;flex-shrink:0;}
.week-widget-inner{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--gold);padding:0.6rem 1rem;display:flex;align-items:center;gap:1rem;}
.week-widget-label{font-size:0.55rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--text3);flex-shrink:0;}
.week-widget-text{font-size:0.8rem;color:var(--text2);flex:1;font-style:italic;}
.week-widget-edit{background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;font-family:'Josefin Sans',sans-serif;transition:color 0.2s;flex-shrink:0;}
.week-widget-edit:hover{color:var(--gold);}

/* BOARD */
.board-scroll{flex:1;overflow-x:auto;overflow-y:hidden;padding:0.5rem 1rem 1rem;display:flex;gap:0.55rem;align-items:flex-start;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:rgba(155,106,191,0.2) transparent;}
.board-scroll::-webkit-scrollbar{height:4px;}
.board-scroll::-webkit-scrollbar-thumb{background:rgba(155,106,191,0.22);}

/* PILLAR COLUMNS */
.pillar-col{background:var(--surface);border:1px solid var(--border);width:195px;min-width:195px;display:flex;flex-direction:column;max-height:100%;overflow:hidden;cursor:pointer;transition:border-color 0.2s,box-shadow 0.2s;flex-shrink:0;position:relative;}
.pillar-col::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.pillar-col:hover{box-shadow:0 4px 24px rgba(0,0,0,0.6);}
.pillar-col.focus-col{border-color:rgba(160,56,88,0.45);}
.col-header{padding:0.85rem 0.85rem 0.65rem;flex-shrink:0;}
.col-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.6rem;}
.col-name{font-size:0.58rem;letter-spacing:0.24em;text-transform:uppercase;color:var(--text3);line-height:1.4;flex:1;}
.col-pct{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;line-height:1;}
.col-bar{height:2px;background:rgba(255,255,255,0.05);overflow:hidden;}
.col-bar-fill{height:100%;transition:width 0.5s ease;}
.col-tasks{padding:0.5rem 0.65rem 0.4rem;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:0.26rem;scrollbar-width:none;}
.col-tasks::-webkit-scrollbar{display:none;}
.task-chip{background:var(--surface2);border:1px solid rgba(155,106,191,0.08);padding:0.4rem 0.52rem;font-size:0.67rem;color:var(--text2);line-height:1.35;display:flex;align-items:flex-start;gap:0.38rem;}
.task-chip.done{opacity:0.3;}
.task-chip.done .chip-text{text-decoration:line-through;}
.chip-dot{width:4px;height:4px;flex-shrink:0;margin-top:5px;}
.col-more{margin:0 0.65rem 0.4rem;border:1px dashed rgba(155,106,191,0.12);padding:0.32rem 0.52rem;font-size:0.56rem;letter-spacing:0.1em;color:var(--text4);text-align:center;flex-shrink:0;}
.col-empty{font-size:0.6rem;color:var(--text4);text-align:center;padding:0.85rem 0.4rem;line-height:1.9;}
.col-open{font-size:0.5rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--text4);padding:0.42rem 0.65rem;border-top:1px solid rgba(155,106,191,0.07);text-align:right;flex-shrink:0;transition:color 0.2s;}
.pillar-col:hover .col-open{color:var(--text3);}

/* PILLAR DETAIL */
#pillarScreen{display:none;}
.pillar-header{background:var(--surface);border-bottom:2px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:50;position:relative;}
.pillar-header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.back-btn{background:none;border:1px solid var(--border);color:var(--text3);width:32px;height:32px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.back-btn:hover{border-color:var(--gold);color:var(--gold);}
.ph-name{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;letter-spacing:0.12em;color:var(--gold);flex:1;}
.ph-right{display:flex;flex-direction:column;align-items:flex-end;gap:1px;flex-shrink:0;}
.ph-pct{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;line-height:1;}
.ph-sub{font-size:0.5rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3);}
.progress-bar{height:3px;background:var(--surface2);}
.progress-fill{height:100%;transition:width 0.5s ease;}
.pillar-body{padding:1.5rem;}

/* TRACKER SYNC */
.sync-bar{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--purple);padding:0.7rem 1rem;margin-bottom:1.4rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.sync-label{font-size:0.56rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);margin-bottom:2px;}
.sync-breakdown{font-size:0.6rem;color:var(--text3);}
.sync-pct{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--purple);font-weight:300;}

/* SHARED UI */
.section-label{font-size:0.56rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--text3);margin-bottom:0.65rem;display:flex;align-items:center;gap:0.5rem;}
.section-label::after{content:'';flex:1;height:1px;background:rgba(155,106,191,0.14);}
.section-gap{height:1.4rem;}
.btn-sm{background:none;border:1px solid var(--border2);color:var(--purple-btn);padding:0.3rem 0.8rem;font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;font-family:'Josefin Sans',sans-serif;transition:all 0.2s;}
.btn-sm:hover{border-color:var(--border-gold);color:var(--gold);}
.btn-gold{background:var(--gold-dim);border:1px solid var(--border-gold);color:var(--gold);}
.btn-gold:hover{background:rgba(201,168,76,0.2);}
.save-dot{font-size:0.56rem;color:var(--teal);opacity:0;transition:opacity 0.3s;margin-bottom:0.5rem;display:inline-block;}
.save-dot.show{opacity:1;}
.inline-add-row{display:flex;gap:0.4rem;margin-bottom:1rem;}

/* TASKS */
.task-list{display:flex;flex-direction:column;gap:0.3rem;margin-bottom:1.1rem;}
.task-row{display:flex;align-items:center;gap:0.7rem;padding:0.55rem 0.8rem;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:border-color 0.15s;}
.task-row:hover{border-color:var(--border2);}
.task-row.done{opacity:0.4;}
.task-row.done .task-label{text-decoration:line-through;color:var(--text3);}
.task-check{width:15px;height:15px;border:1px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.55rem;background:none;}
.task-row.done .task-check{background:rgba(58,154,90,0.2);border-color:var(--live);color:var(--live);}
.task-label{font-size:0.8rem;color:var(--text2);flex:1;line-height:1.4;}
.task-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.68rem;padding:2px 4px;opacity:0;}
.task-row:hover .task-del{opacity:1;}
.task-del:hover{color:var(--rose);}
.add-task-row{display:flex;gap:0.4rem;margin-bottom:1.1rem;}
.add-task-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:0.5rem 0.8rem;font-size:0.8rem;font-family:'Josefin Sans',sans-serif;outline:none;transition:border-color 0.2s;letter-spacing:0.03em;}
.add-task-input:focus{border-color:var(--gold);}
.add-task-input::placeholder{color:var(--text3);}

/* KANBAN */
.kanban-wrap{display:grid;grid-template-columns:repeat(2,1fr);gap:0.5rem;margin-bottom:1.2rem;}
@media(min-width:600px){.kanban-wrap{grid-template-columns:repeat(4,1fr);}}
.kanban-col{background:var(--surface);border:1px solid var(--border);padding:0.7rem;min-height:100px;}
.kanban-col-title{font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);margin-bottom:0.55rem;padding-bottom:0.45rem;border-bottom:1px solid var(--border);}
.kanban-item{background:var(--surface2);border:1px solid var(--border);padding:0.45rem 0.6rem;font-size:0.72rem;color:var(--text2);margin-bottom:0.3rem;cursor:pointer;position:relative;transition:border-color 0.15s;}
.kanban-item:hover{border-color:var(--border2);}
.kanban-item-del{position:absolute;top:3px;right:5px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.58rem;opacity:0;}
.kanban-item:hover .kanban-item-del{opacity:1;}
.kanban-item-del:hover{color:var(--rose);}
.kanban-add{width:100%;background:var(--surface3);border:1px dashed rgba(155,106,191,0.16);color:var(--text2);padding:0.38rem 0.55rem;font-size:0.7rem;font-family:'Josefin Sans',sans-serif;outline:none;margin-top:0.3rem;letter-spacing:0.02em;}
.kanban-add:focus{border-color:var(--border2);}
.kanban-add::placeholder{color:var(--text3);}

/* PEOPLE */
.people-list{display:flex;flex-direction:column;gap:0.35rem;margin-bottom:1.1rem;}
.person-card{background:var(--surface);border:1px solid var(--border);}
.person-header{display:flex;align-items:center;gap:0.7rem;padding:0.8rem 0.9rem;cursor:pointer;}
.person-avatar{width:30px;height:30px;background:var(--surface3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:0.9rem;color:var(--gold);flex-shrink:0;}
.person-name{font-size:0.82rem;color:var(--text);flex:1;}
.person-status-pill{font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.15rem 0.5rem;}
.status-good{background:var(--live-dim);color:var(--live);border:1px solid rgba(58,154,90,0.3);}
.status-due{background:var(--gold-dim);color:var(--gold);border:1px solid var(--border-gold);}
.status-overdue{background:rgba(160,56,88,0.1);color:var(--rose);border:1px solid rgba(160,56,88,0.3);}
.person-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.65rem;margin-left:4px;transition:color 0.2s;}
.person-del:hover{color:var(--rose);}
.person-body{display:none;padding:0.65rem 0.9rem 0.9rem;border-top:1px solid var(--border);}
.person-body.open{display:block;}

/* DATA TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:0.75rem;margin-bottom:1.1rem;}
.data-table th{font-size:0.55rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--text3);text-align:left;padding:0.45rem 0.65rem;border-bottom:2px solid var(--border);font-weight:400;}
.data-table td{padding:0.55rem 0.65rem;border-bottom:1px solid rgba(155,106,191,0.07);color:var(--text2);vertical-align:middle;}
.data-table tr:hover td{background:var(--surface2);}

/* STATUS CHIPS */
.status-chip{font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.18rem 0.5rem;display:inline-block;}
.chip-paid{background:var(--live-dim);color:var(--live);border:1px solid rgba(58,154,90,0.3);}
.chip-sent{background:var(--gold-dim);color:var(--gold);border:1px solid var(--border-gold);}
.chip-overdue{background:rgba(160,56,88,0.1);color:var(--rose);border:1px solid rgba(160,56,88,0.3);}
.chip-pending{background:rgba(155,106,191,0.1);color:var(--purple-btn);border:1px solid var(--border);}
.chip-done{background:var(--live-dim);color:var(--live);border:1px solid rgba(58,154,90,0.3);}
.chip-booked{background:var(--gold-dim);color:var(--gold);border:1px solid var(--border-gold);}
.chip-lead{background:var(--purple-dim);color:var(--purple-btn);border:1px solid var(--border);}
.chip-quoted{background:rgba(42,136,112,0.1);color:var(--teal);border:1px solid rgba(42,136,112,0.3);}
.chip-completed{background:var(--live-dim);color:var(--live);border:1px solid rgba(58,154,90,0.3);}

/* GOALS */
.goal-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--gold);padding:0.85rem 1rem;margin-bottom:0.5rem;}
.goal-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;}
.goal-card-name{font-size:0.82rem;color:var(--text);flex:1;}
.goal-card-pct{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;}
.goal-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.65rem;margin-left:0.4rem;}
.goal-del:hover{color:var(--rose);}
.goal-bar-wrap{height:3px;background:rgba(255,255,255,0.05);margin:0.4rem 0;}
.goal-bar-fill{height:100%;transition:width 0.5s ease;background:var(--gold);}
.goal-meta{display:flex;gap:1rem;flex-wrap:wrap;font-size:0.62rem;color:var(--text3);margin-top:0.3rem;}

/* CHECKLIST TEMPLATES */
.checklist-block{background:var(--surface);border:1px solid var(--border);margin-bottom:0.5rem;}
.ct-header{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 0.9rem;cursor:pointer;border-bottom:1px solid rgba(155,106,191,0.08);}
.ct-name{font-size:0.8rem;color:var(--text);letter-spacing:0.04em;}
.ct-meta{font-size:0.58rem;color:var(--text3);margin-top:2px;letter-spacing:0.06em;}
.ct-body{display:none;padding:0.75rem 0.9rem;}
.ct-body.open{display:block;}
.ct-item{display:flex;align-items:center;gap:0.6rem;padding:0.45rem 0;border-bottom:1px solid rgba(155,106,191,0.06);font-size:0.75rem;color:var(--text2);cursor:pointer;}
.ct-item:last-child{border-bottom:none;}
.ct-item-check{width:14px;height:14px;border:1px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.52rem;}
.ct-item.checked{opacity:0.4;}
.ct-item.checked .ct-item-check{background:rgba(58,154,90,0.2);border-color:var(--live);color:var(--live);}
.ct-item.checked .ct-item-label{text-decoration:line-through;}
.ct-item-label{flex:1;}

/* SOCIAL EXTRAS */
.brand-asset-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.45rem;margin-bottom:1.1rem;}
.brand-asset-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--purple);padding:0.65rem 0.85rem;}
.brand-asset-label{font-size:0.55rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--text3);margin-bottom:0.25rem;}
.brand-asset-value{font-size:0.82rem;color:var(--text2);}

/* PHOTO BOARD */
.photo-board{display:grid;grid-template-columns:repeat(2,1fr);gap:0.45rem;margin-bottom:1rem;}
@media(min-width:480px){.photo-board{grid-template-columns:repeat(3,1fr);}}
.photo-card{background:var(--surface);border:1px solid var(--border);overflow:hidden;position:relative;aspect-ratio:1;cursor:pointer;transition:border-color 0.15s;}
.photo-card:hover{border-color:var(--border2);}
.photo-card img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-card-body{padding:0.42rem 0.55rem;}
.photo-card-name{font-size:0.65rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.photo-card-link{font-size:0.55rem;color:var(--teal);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:none;display:block;}
.photo-card-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.8);border:1px solid var(--border);color:var(--text3);width:18px;height:18px;cursor:pointer;font-size:0.55rem;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.15s;}
.photo-card:hover .photo-card-del{opacity:1;}
.photo-add-card{background:var(--surface2);border:1px dashed rgba(155,106,191,0.18);display:flex;align-items:center;justify-content:center;cursor:pointer;aspect-ratio:1;font-size:0.56rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3);transition:border-color 0.15s;}
.photo-add-card:hover{border-color:var(--border2);}

/* LINKS */
.link-list{display:flex;flex-direction:column;gap:0.3rem;margin-bottom:1rem;}
.link-item{display:flex;align-items:center;gap:0.7rem;padding:0.55rem 0.8rem;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--gold);text-decoration:none;transition:border-color 0.15s;cursor:pointer;}
.link-item:hover{border-color:var(--border2);}
.link-item-text{flex:1;}
.link-item-title{font-size:0.78rem;color:var(--gold);}
.link-item-sub{font-size:0.6rem;color:var(--text3);}
.link-item-arrow{color:var(--text3);font-size:0.72rem;}
.link-item:hover .link-item-arrow{color:var(--gold);}
.link-item-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.68rem;padding:2px 4px;opacity:0;}
.link-item:hover .link-item-del{opacity:1;}
.link-item-del:hover{color:var(--rose);}

/* CAL */
.cal-mini-list{display:flex;flex-direction:column;gap:0.3rem;margin-bottom:1rem;}
.cal-mini-item{display:flex;align-items:center;gap:0.7rem;padding:0.55rem 0.8rem;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--gold);}
.cal-mini-date{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--gold);flex-shrink:0;min-width:34px;}
.cal-mini-title{font-size:0.78rem;color:var(--text2);}
.cal-mini-venue{font-size:0.6rem;color:var(--text3);}
.cal-mini-empty{text-align:center;padding:1.2rem;color:var(--text3);font-size:0.72rem;letter-spacing:0.1em;line-height:2;border:1px dashed rgba(155,106,191,0.1);}

/* NOTES */
.notes-area{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:0.6rem 0.85rem;font-size:0.78rem;font-family:'Josefin Sans',sans-serif;outline:none;resize:vertical;min-height:100px;line-height:1.7;transition:border-color 0.2s;margin-bottom:1.1rem;}
.notes-area:focus{border-color:var(--gold);}
.notes-area::placeholder{color:var(--text3);}

/* MODAL */

.modal-bg.open{display:flex;}

.modal-title{font-size:0.62rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--text3);margin-bottom:1rem;}

.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--gold);}

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
'use strict';
let db=null;
try{
  firebase.initializeApp({apiKey:"AIzaSyCIfAE1JGHsUGzzVH2pz1Vyj5b5OhA0tDQ",authDomain:"belladonna-hq.firebaseapp.com",projectId:"belladonna-hq",storageBucket:"belladonna-hq.firebasestorage.app",messagingSenderId:"1021873183587",appId:"1:1021873183587:web:def283bb7b5ca48e4f9156"});
  db=firebase.firestore();
}catch(e){console.warn('Firebase:',e);}

const LS={get:(k)=>{try{return localStorage.getItem(k);}catch(e){return null;}},set:(k,v)=>{try{localStorage.setItem(k,v);}catch(e){}}};

const TRACKER_MAP={
  social:['marketing','brand'],venue:['venues','booking'],crm:['booking','growth'],
  hosts:['talent'],gigs:['operations','booking'],music:['operations'],
  'merch-shop':['brand','finance'],'merch-make':['brand'],events:['growth','marketing'],
  finance:['finance'],legal:['legal'],goals:['growth'],sops:['operations','talent'],
};

const PILLARS=[
  {id:'goals',      name:'Goals & Strategy',   color:'#c9a84c'},
  {id:'social',     name:'Social & Brand',      color:'#a03858'},
  {id:'venue',      name:'Venue Growth',        color:'#2a8870'},
  {id:'crm',        name:'Private Event CRM',   color:'#9b6abf'},
  {id:'hosts',      name:'Hosts & Team',        color:'#7a4a9a'},
  {id:'gigs',       name:'Gigs',                color:'#c9a84c'},
  {id:'music',      name:'Music',               color:'#9b6abf'},
  {id:'merch-shop', name:'Merch Shop',          color:'#7a4a9a'},
  {id:'merch-make', name:'Merch Production',    color:'#2a8870'},
  {id:'events',     name:'Specialty Events',    color:'#a03858'},
  {id:'finance',    name:'Finance',             color:'#3a9a5a'},
  {id:'legal',      name:'Legal & Compliance',  color:'#a03858'},
  {id:'sops',       name:'SOPs & Templates',    color:'#2a8870'},
];

const DESC={goals:'Quarterly targets, revenue goals, weekly priorities',social:'Posts, Reels, branding, email, press, affiliates',venue:'Venue leads, pitches, flyers, partnerships',crm:'Private event leads, quotes, bookings, clients',hosts:'Check-ins, leads, host kits, team notes',gigs:'Bingo, Trivia, Karaoke — scheduling, checklists, gear',music:'Download lists, playlists, interim music',['merch-shop']:'Printify, shop links, product board','merch-make':'Physical make list — stickers, shirts, candles',events:'Upcoming events, marketing, venue pitches',finance:'Invoices, contractor pay, expenses, tax tracker',legal:'Contracts, licenses, insurance, agreements',sops:'How we do things — procedures, guides, checklists'};

const DEFAULT_LEGAL_ITEMS=[
  {id:'l1',name:'LLC registered and active',cat:'Business',renewal:'',done:false},
  {id:'l2',name:'EIN obtained from IRS',cat:'Business',renewal:'',done:false},
  {id:'l3',name:'General liability insurance active',cat:'Insurance',renewal:'',done:false},
  {id:'l4',name:'Music license (ASCAP/BMI awareness)',cat:'License',renewal:'',done:false},
  {id:'l5',name:'Venue contract template created',cat:'Contract',renewal:'',done:false},
  {id:'l6',name:'Independent contractor agreements for hosts',cat:'Contract',renewal:'',done:false},
  {id:'l7',name:'Website terms & conditions live',cat:'Website',renewal:'',done:false},
  {id:'l8',name:'Website privacy policy live',cat:'Website',renewal:'',done:false},
  {id:'l9',name:'Business license current',cat:'License',renewal:'',done:false},
];

const DEFAULT_SHOW_CHECKLISTS=[
  {id:'cl1',name:'Pre-Show Setup',items:[{id:'i1',label:'Confirm load-in time with venue',done:false},{id:'i2',label:'Pack all gear (PA, mics, cables, laptop)',done:false},{id:'i3',label:'Charge all devices',done:false},{id:'i4',label:'Update song library / trivia questions',done:false},{id:'i5',label:'Test audio before guests arrive',done:false},{id:'i6',label:'Set up signage and branding',done:false},{id:'i7',label:'Brief any co-host on the plan',done:false}]},
  {id:'cl2',name:'During Show',items:[{id:'i1',label:'Welcome crowd and set energy',done:false},{id:'i2',label:'Track crowd engagement',done:false},{id:'i3',label:'Run mini games between rounds',done:false},{id:'i4',label:'Announce upcoming events',done:false},{id:'i5',label:'Promote tip link',done:false}]},
  {id:'cl3',name:'Post-Show Breakdown',items:[{id:'i1',label:'Strike all gear and pack out',done:false},{id:'i2',label:'Thank venue manager',done:false},{id:'i3',label:'Note crowd wins or issues',done:false},{id:'i4',label:'Submit checkout report',done:false},{id:'i5',label:'Log gig pay',done:false}]},
];

let pillarData={};
let trackerAnswers={};
let trackerCategories=[];
let calEntries=[];
let ideas=[];
let weekFocus='';
let curPillar=null;

function defData(id){
  const base={tasks:[],links:[],notes:''};
  if(id==='venue') return{...base,kanban:{lead:[],contacted:[],active:[],won:[]}};
  if(id==='hosts') return{...base,people:[]};
  if(id==='crm') return{...base,clients:[],kanban:{lead:[],quoted:[],booked:[],completed:[]}};
  if(id==='merch-shop') return{...base,photos:[]};
  if(id==='finance') return{...base,invoices:[],contractors:[],expenses:[],taxRate:25};
  if(id==='legal') return{...base,items:DEFAULT_LEGAL_ITEMS.map(x=>({...x}))};
  if(id==='goals') return{...base,goals:[],weekFocus:''};
  if(id==='sops') return{...base,templates:[]};
  if(id==='gigs') return{...base,equipment:[],checklists:DEFAULT_SHOW_CHECKLISTS.map(cl=>({...cl,items:cl.items.map(i=>({...i}))}))};
  if(id==='social') return{...base,brandAssets:{colors:'',fonts:'',tagline:'',emailList:'',followers:''}};
  return base;
}

function loadAll(){
  PILLARS.forEach(p=>{
    const raw=LS.get('cc3-'+p.id);
    pillarData[p.id]=raw?JSON.parse(raw):defData(p.id);
    if(!pillarData[p.id].tasks) pillarData[p.id].tasks=[];
    if(!pillarData[p.id].links) pillarData[p.id].links=[];
    if(p.id==='venue'&&!pillarData[p.id].kanban) pillarData[p.id].kanban={lead:[],contacted:[],active:[],won:[]};
    if(p.id==='crm'){if(!pillarData[p.id].clients)pillarData[p.id].clients=[];if(!pillarData[p.id].kanban)pillarData[p.id].kanban={lead:[],quoted:[],booked:[],completed:[]};}
    if(p.id==='hosts'&&!pillarData[p.id].people) pillarData[p.id].people=[];
    if(p.id==='merch-shop'&&!pillarData[p.id].photos) pillarData[p.id].photos=[];
    if(p.id==='finance'){if(!pillarData[p.id].invoices)pillarData[p.id].invoices=[];if(!pillarData[p.id].contractors)pillarData[p.id].contractors=[];if(!pillarData[p.id].expenses)pillarData[p.id].expenses=[];}
    if(p.id==='legal'&&!pillarData[p.id].items) pillarData[p.id].items=DEFAULT_LEGAL_ITEMS.map(x=>({...x}));
    if(p.id==='goals'&&!pillarData[p.id].goals){pillarData[p.id].goals=[];}
    if(p.id==='sops'&&!pillarData[p.id].templates) pillarData[p.id].templates=[];
    if(p.id==='gigs'){if(!pillarData[p.id].equipment)pillarData[p.id].equipment=[];if(!pillarData[p.id].checklists)pillarData[p.id].checklists=DEFAULT_SHOW_CHECKLISTS.map(cl=>({...cl,items:cl.items.map(i=>({...i}))}));}
    if(p.id==='social'&&!pillarData[p.id].brandAssets) pillarData[p.id].brandAssets={colors:'',fonts:'',tagline:'',emailList:'',followers:''};
  });
  try{const t=LS.get('tracker-answers');if(t)trackerAnswers=JSON.parse(t);}catch(e){}
  try{const c=LS.get('tracker-categories');if(c)trackerCategories=JSON.parse(c);}catch(e){}
  try{const id=LS.get('cc3-ideas');if(id)ideas=JSON.parse(id);}catch(e){}
  try{const wf=LS.get('cc3-weekfocus');if(wf)weekFocus=wf;}catch(e){}

  if(db){
    db.collection('command_center').doc('pillars').onSnapshot(snap=>{
      if(!snap.exists)return;
      const d=snap.data();
      PILLARS.forEach(p=>{if(d[p.id]){pillarData[p.id]=d[p.id];LS.set('cc3-'+p.id,JSON.stringify(d[p.id]));}});
      if(d._ideas){ideas=d._ideas;LS.set('cc3-ideas',JSON.stringify(ideas));}
      if(d._weekFocus!==undefined){weekFocus=d._weekFocus;LS.set('cc3-weekfocus',weekFocus);}
      renderHome();
      if(curPillar)renderPillar(curPillar);
    },()=>{});
    db.collection('tracker_data').doc('state').onSnapshot(snap=>{
      if(!snap.exists)return;
      const d=snap.data();
      if(d.answers){trackerAnswers=d.answers;LS.set('tracker-answers',JSON.stringify(d.answers));}
      if(d.categories){trackerCategories=d.categories;LS.set('tracker-categories',JSON.stringify(d.categories));}
      renderHome();
      if(curPillar)renderPillar(curPillar);
    },()=>{});
    db.collection('hq_data').doc('cal-entries').get().then(snap=>{
      if(snap.exists){try{calEntries=JSON.parse(snap.data().value)||[];}catch(e){}}
      if(curPillar==='gigs')renderPillar('gigs');
    }).catch(()=>{});
  }
}

function cloudSave(){
  if(!db)return;
  const payload={_ideas:ideas,_weekFocus:weekFocus};
  db.collection('command_center').doc('pillars').set(payload,{merge:true}).catch(()=>{});
}

function save(id,dot){
  LS.set('cc3-'+id,JSON.stringify(pillarData[id]));
  if(db){const u={};u[id]=pillarData[id];db.collection('command_center').doc('pillars').set(u,{merge:true}).catch(()=>{});}
  if(dot){const d=document.getElementById('saveDot');if(d){d.classList.add('show');setTimeout(()=>d.classList.remove('show'),1500);}}
  renderHome();
}

// PROGRESS
function ccProg(id){
  const d=pillarData[id];if(!d)return null;
  let tot=0,dn=0;
  (d.tasks||[]).forEach(t=>{tot++;if(t.done)dn++;});
  if(d.kanban){Object.entries(d.kanban).forEach(([col,items],i,arr)=>{(items||[]).forEach(()=>{tot++;if(i>=arr.length-2)dn++;});});}
  (d.people||[]).forEach(p=>{tot++;if(p.status==='good')dn++;});
  (d.clients||[]).forEach(c=>{tot++;if(c.status==='completed')dn++;});
  (d.items||[]).forEach(i=>{tot++;if(i.done)dn++;});
  (d.goals||[]).forEach(g=>{const p=g.target>0?Math.min(1,g.current/g.target):0;tot+=1;dn+=p;});
  (d.invoices||[]).forEach(i=>{tot++;if(i.status==='paid')dn++;});
  if(tot===0)return null;
  return Math.round((dn/tot)*100);
}
function trackerProg(id){
  const cats=TRACKER_MAP[id]||[];if(!cats.length||!trackerCategories.length)return null;
  let score=0,items=0;
  cats.forEach(cid=>{const cat=trackerCategories.find(c=>c.id===cid);if(!cat)return;cat.items.forEach(item=>{const a=trackerAnswers[cid+'_'+item.id];items++;if(a==='yes')score+=1;else if(a==='partial')score+=0.5;});});
  if(items===0)return null;
  return Math.round((score/items)*100);
}
function combined(id){const cc=ccProg(id),tr=trackerProg(id);if(cc===null&&tr===null)return 0;if(cc===null)return tr;if(tr===null)return cc;return Math.round((cc+tr)/2);}
function getFocus(){let low=null,lp=101;PILLARS.forEach(p=>{const pct=combined(p.id);if(pct<lp){lp=pct;low=p;}});return low;}

// GREETING
function updateGreeting(){const h=new Date().getHours(),el=document.getElementById('greetingText');if(!el)return;el.textContent=h<5||h>=22?'Still at it.':h<12?'Good morning.':h<17?'Good afternoon.':'Good evening.';}

// HOME
function renderHome(){
  const grid=document.getElementById('pillarsGrid');if(!grid)return;
  const focus=getFocus();
  const fb=document.getElementById('focusBadge'),fn=document.getElementById('focusPillarName');
  if(focus&&fb&&fn){fb.style.display='block';fn.textContent=focus.name;}
  // week focus widget
  const ww=document.getElementById('weekWidget'),wt=document.getElementById('weekWidgetText');
  if(ww&&wt){ww.style.display='block';wt.textContent=weekFocus||'No focus set — tap Edit to add this week\'s priorities';}
  const sorted=[...PILLARS].sort((a,b)=>combined(a.id)-combined(b.id));
  grid.innerHTML=sorted.map(p=>{
    const pct=combined(p.id);
    const d=pillarData[p.id]||{};
    const tasks=d.tasks||[];
    const inc=tasks.filter(t=>!t.done),dn=tasks.filter(t=>t.done);
    const isFocus=focus&&focus.id===p.id;
    const vis=[...inc.slice(0,5),...dn.slice(0,1)];
    const more=inc.length>5?inc.length-5:0;
    const tasksHTML=vis.map(t=>'<div class="task-chip'+(t.done?' done':'')+'"><div class="chip-dot" style="background:'+p.color+';opacity:'+(t.done?'0.2':'0.6')+';"></div><span class="chip-text">'+esc(t.label)+'</span></div>').join('');
    const cc=ccProg(p.id),tr=trackerProg(p.id);
    const detail=[cc!==null?'tasks: '+cc+'%':null,tr!==null?'tracker: '+tr+'%':null].filter(Boolean).join(' \xb7 ');
    return '<div class="pillar-col'+(isFocus?' focus-col':'')+'" onclick="openPillar(\''+p.id+'\')">'+
      '<style>.pillar-col[onclick*="\''+p.id+'\'"]::before{background:'+p.color+';}</style>'+
      '<div class="col-header"><div class="col-top"><div class="col-name">'+p.name+'</div><div class="col-pct" style="color:'+p.color+'">'+pct+'%</div></div><div class="col-bar"><div class="col-bar-fill" style="width:'+pct+'%;background:'+p.color+';"></div></div></div>'+
      '<div class="col-tasks">'+(tasks.length===0?'<div class="col-empty">'+esc(DESC[p.id]||'')+'</div>':tasksHTML)+'</div>'+
      (more>0?'<div class="col-more">+'+more+' more</div>':'<div class="col-more" style="opacity:0.28;">+ tap to add tasks</div>')+
      '<div class="col-open">'+(detail||'open')+' \u203a</div>'+
    '</div>';
  }).join('');
}

function openPillar(id){
  curPillar=id;
  document.getElementById('homeScreen').style.display='none';
  document.getElementById('pillarScreen').style.display='block';
  const p=PILLARS.find(x=>x.id===id);
  document.getElementById('phName').textContent=p.name;
  let s=document.getElementById('phStyle');if(!s){s=document.createElement('style');s.id='phStyle';document.head.appendChild(s);}
  s.textContent='#pillarHeader::before{background:'+p.color+'!important;}';
  renderPillar(id);window.scrollTo(0,0);
}
function goHome(){curPillar=null;document.getElementById('pillarScreen').style.display='none';document.getElementById('homeScreen').style.display='block';renderHome();window.scrollTo(0,0);}

function renderPillar(id){
  const p=PILLARS.find(x=>x.id===id);
  const pct=combined(id),cc=ccProg(id),tr=trackerProg(id);
  document.getElementById('phPct').textContent=pct+'%';
  document.getElementById('phPct').style.color=p.color;
  document.getElementById('progressFill').style.cssText='width:'+pct+'%;background:'+p.color+';';
  document.getElementById('pillarBody').innerHTML=buildPillar(id,cc,tr,p.color);
  document.querySelectorAll('textarea').forEach(ta=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});});
}

function buildPillar(id,cc,tr,color){
  const cats=(TRACKER_MAP[id]||[]).map(cid=>{const c=trackerCategories.find(x=>x.id===cid);return c?c.name:cid;}).join(', ');
  let h='<span class="save-dot" id="saveDot">Saved \u2713</span>';
  h+='<div class="sync-bar"><div><div class="sync-label">Combined Score</div><div class="sync-breakdown">'+(cc!==null?'Tasks: '+cc+'%':'No tasks yet')+(tr!==null?' &nbsp;&middot;&nbsp; Tracker: '+tr+'%':' &nbsp;&middot;&nbsp; Tracker: not started')+'</div>'+(cats?'<div class="sync-breakdown" style="color:var(--text4);margin-top:1px;">Tracker categories: '+esc(cats)+'</div>':'')+'</div><div class="sync-pct">'+(tr!==null?tr+'%':'&mdash;')+'</div></div>';
  h+=buildTasks(id);
  if(id==='goals') h+=buildGoals(id)+buildIdeas();
  else if(id==='social') h+=buildSocial(id);
  else if(id==='venue') h+=buildKanban(id,'Venue Pipeline',{lead:'Lead',contacted:'Contacted',active:'Active',won:'Won'})+buildLinks(id,'Resources')+buildNotes(id,'Pitch Notes');
  else if(id==='crm') h+=buildCRM(id);
  else if(id==='hosts') h+=buildPeople(id,'hosts')+buildLinks(id,'Resources')+buildNotes(id,'Team Notes');
  else if(id==='gigs') h+=buildGigsCal()+buildChecklists(id)+buildEquipment(id)+buildLinks(id,'Quick Links')+buildNotes(id,'Gig Prep Notes');
  else if(id==='music') h+=buildLinks(id,'Playlists & Sources')+buildNotes(id,'Download List & Ideas');
  else if(id==='merch-shop') h+=buildPhotoBoard(id)+buildLinks(id,'Shop Links')+buildNotes(id,'Shop Notes');
  else if(id==='merch-make') h+=buildNotes(id,'Make List')+buildLinks(id,'Supplies & Resources');
  else if(id==='events') h+=buildLinks(id,'Events & Pitches')+buildNotes(id,'Concepts & Marketing Notes');
  else if(id==='finance') h+=buildFinance(id);
  else if(id==='legal') h+=buildLegal(id);
  else if(id==='sops') h+=buildSOPs(id);
  return h;
}

// TASKS
function buildTasks(id){const tasks=pillarData[id].tasks||[];const inc=tasks.filter(t=>!t.done),dn=tasks.filter(t=>t.done);let h='<div class="section-label">To-Do</div><div class="add-task-row"><input class="add-task-input" id="newTaskInput" placeholder="Add a task..." onkeydown="if(event.key===\'Enter\')addTask(\''+id+'\')"><button class="btn-sm btn-gold" onclick="addTask(\''+id+'\')">+ Add</button></div><div class="task-list">';inc.forEach(t=>{h+=tRow(id,t);});if(dn.length){h+='<div style="font-size:0.52rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);padding:0.3rem 0.2rem;margin-top:0.2rem;">Done ('+dn.length+')</div>';dn.forEach(t=>{h+=tRow(id,t);});}return h+'</div>';}
function tRow(id,t){return'<div class="task-row'+(t.done?' done':'')+'" onclick="toggleTask(\''+id+'\',\''+t.id+'\')">'+'<div class="task-check">'+(t.done?'&#10003;':'')+'</div><div class="task-label">'+esc(t.label)+'</div><button class="task-del" onclick="event.stopPropagation();delTask(\''+id+'\',\''+t.id+'\')">&#10005;</button></div>';}
function addTask(id){const inp=document.getElementById('newTaskInput');if(!inp)return;const v=inp.value.trim();if(!v)return;pillarData[id].tasks.push({id:'t'+Date.now(),label:v,done:false});inp.value='';save(id,true);renderPillar(id);}
function toggleTask(id,tid){const t=(pillarData[id].tasks||[]).find(x=>x.id===tid);if(t){t.done=!t.done;save(id);renderPillar(id);}}
function delTask(id,tid){pillarData[id].tasks=(pillarData[id].tasks||[]).filter(x=>x.id!==tid);save(id);renderPillar(id);}

// KANBAN
function buildKanban(id,label,colDefs){
  const k=pillarData[id].kanban||{};
  const keys=Object.keys(colDefs);
  let h='<div class="section-label">'+label+'</div><div class="kanban-wrap">';
  keys.forEach(key=>{
    h+='<div class="kanban-col"><div class="kanban-col-title">'+colDefs[key]+' ('+(k[key]||[]).length+')</div>';
    (k[key]||[]).forEach(item=>{h+='<div class="kanban-item" ondblclick="moveKanban(\''+id+'\',\''+key+'\',\''+item.id+'\','+JSON.stringify(keys)+')">'+esc(item.name)+'<button class="kanban-item-del" onclick="event.stopPropagation();delKanban(\''+id+'\',\''+key+'\',\''+item.id+'\')">&#10005;</button></div>';});
    h+='<input type="text" class="kanban-add" placeholder="+ Add..." data-col="'+key+'" onkeydown="if(event.key===\'Enter\')addKanban(\''+id+'\',this)"></div>';
  });
  return h+'</div><div style="font-size:0.58rem;color:var(--text3);margin-bottom:1rem;letter-spacing:0.04em;">Double-tap a card to advance to next stage</div>';
}
function addKanban(id,inp){const n=inp.value.trim();if(!n)return;const col=inp.dataset.col;if(!pillarData[id].kanban[col])pillarData[id].kanban[col]=[];pillarData[id].kanban[col].push({id:'k'+Date.now(),name:n});inp.value='';save(id);renderPillar(id);}
function delKanban(id,col,kid){pillarData[id].kanban[col]=(pillarData[id].kanban[col]||[]).filter(x=>x.id!==kid);save(id);renderPillar(id);}
function moveKanban(id,fromCol,kid,keys){const fi=keys.indexOf(fromCol);if(fi===-1||fi===keys.length-1)return;const toCol=keys[fi+1];const item=(pillarData[id].kanban[fromCol]||[]).find(x=>x.id===kid);if(!item)return;pillarData[id].kanban[fromCol]=pillarData[id].kanban[fromCol].filter(x=>x.id!==kid);if(!pillarData[id].kanban[toCol])pillarData[id].kanban[toCol]=[];pillarData[id].kanban[toCol].push(item);save(id);renderPillar(id);}

  h+='</tbody></table>';
  h+='<div class="section-label">Expenses <button class="btn-sm btn-gold" style="margin-left:auto;" onclick="addExpense()">+ Add</button></div>';
  h+='<table class="data-table"><thead><tr><th>Description</th><th>Category</th><th>Amount</th><th></th></tr></thead><tbody>';
  if(!d.expenses.length)h+='<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:0.8rem;font-size:0.72rem;">No expenses logged</td></tr>';
  d.expenses.forEach(e=>{h+='<tr><td>'+esc(e.desc)+'</td><td>'+esc(e.cat||'')+'</td><td>$'+esc(String(e.amount||0))+'</td><td><button class="task-del" style="opacity:1;" onclick="delExpense(\''+e.id+'\')">&#10005;</button></td></tr>';});
  h+='</tbody></table>';
  h+='<div class="section-label">Tax Rate</div><div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:1.2rem;"><input type="number" class="form-input" style="width:75px;" value="'+d.taxRate+'" onchange="pillarData[\'finance\'].taxRate=parseFloat(this.value)||25;save(\'finance\');renderPillar(\'finance\');"><span style="font-size:0.7rem;color:var(--text3);">% of paid income set aside for taxes</span></div>';
  h+=buildNotes(id,'Finance Notes');
  return h;
}
function addInvoice(){openModal('Add Invoice','<div class="form-group"><label class="form-label">Client / Venue</label><input class="form-input" id="invClient" placeholder="Who is paying you?"></div><div class="form-group"><label class="form-label">Amount ($)</label><input type="number" class="form-input" id="invAmt" placeholder="0"></div><div class="form-group"><label class="form-label">Date</label><input type="date" class="form-input" id="invDate"></div><div class="form-group"><label class="form-label">Status</label><select class="form-select" id="invStatus"><option value="sent">Sent</option><option value="paid">Paid</option><option value="overdue">Overdue</option></select></div>',()=>{const c=document.getElementById('invClient').value.trim();if(!c)return;if(!pillarData['finance'].invoices)pillarData['finance'].invoices=[];pillarData['finance'].invoices.push({id:'inv'+Date.now(),client:c,amount:document.getElementById('invAmt').value,date:document.getElementById('invDate').value,status:document.getElementById('invStatus').value});save('finance',true);renderPillar('finance');closeModal();});}
function cycleInvoice(id){const inv=(pillarData['finance'].invoices||[]).find(x=>x.id===id);if(!inv)return;const cycle=['sent','paid','overdue'];inv.status=cycle[(cycle.indexOf(inv.status)+1)%cycle.length];save('finance');renderPillar('finance');}
function delInvoice(id){pillarData['finance'].invoices=(pillarData['finance'].invoices||[]).filter(x=>x.id!==id);save('finance');renderPillar('finance');}
function addContractor(){openModal('Add Contractor Pay','<div class="form-group"><label class="form-label">Host Name</label><input class="form-input" id="ctName" placeholder="Host name"></div><div class="form-group"><label class="form-label">Gig / Event</label><input class="form-input" id="ctGig" placeholder="e.g. Coaster Karaoke Apr 18"></div><div class="form-group"><label class="form-label">Amount ($)</label><input type="number" class="form-input" id="ctAmt" placeholder="0"></div>',()=>{const n=document.getElementById('ctName').value.trim();if(!n)return;if(!pillarData['finance'].contractors)pillarData['finance'].contractors=[];pillarData['finance'].contractors.push({id:'ct'+Date.now(),name:n,gig:document.getElementById('ctGig').value.trim(),amount:document.getElementById('ctAmt').value,paid:false});save('finance',true);renderPillar('finance');closeModal();});}
function toggleCPaid(id){const c=(pillarData['finance'].contractors||[]).find(x=>x.id===id);if(c){c.paid=!c.paid;save('finance');renderPillar('finance');}}
function delContractor(id){pillarData['finance'].contractors=(pillarData['finance'].contractors||[]).filter(x=>x.id!==id);save('finance');renderPillar('finance');}
function addExpense(){openModal('Add Expense','<div class="form-group"><label class="form-label">Description</label><input class="form-input" id="exDesc" placeholder="What was it?"></div><div class="form-group"><label class="form-label">Category</label><input class="form-input" id="exCat" placeholder="e.g. Equipment, Marketing, Software, Food"></div><div class="form-group"><label class="form-label">Amount ($)</label><input type="number" class="form-input" id="exAmt" placeholder="0"></div>',()=>{const d=document.getElementById('exDesc').value.trim();if(!d)return;if(!pillarData['finance'].expenses)pillarData['finance'].expenses=[];pillarData['finance'].expenses.push({id:'ex'+Date.now(),desc:d,cat:document.getElementById('exCat').value.trim(),amount:document.getElementById('exAmt').value});save('finance',true);renderPillar('finance');closeModal();});}
function delExpense(id){pillarData['finance'].expenses=(pillarData['finance'].expenses||[]).filter(x=>x.id!==id);save('finance');renderPillar('finance');}

// LEGAL
function buildLegal(id){
  const d=pillarData[id];if(!d.items)d.items=[];
  let h='<div class="section-label">Compliance Tracker <button class="btn-sm btn-gold" style="margin-left:auto;" onclick="addLegal()">+ Add Item</button></div>';
  h+='<table class="data-table"><thead><tr><th>Item</th><th>Category</th><th>Renewal</th><th>Status</th><th></th></tr></thead><tbody>';
  d.items.forEach(item=>{h+='<tr><td>'+esc(item.name)+'</td><td>'+esc(item.cat||'')+'</td><td>'+esc(item.renewal||'')+'</td><td><span class="status-chip '+(item.done?'chip-done':'chip-pending')+'">'+(item.done?'Done':'Pending')+'</span></td><td style="white-space:nowrap;"><button class="task-del" style="opacity:1;margin-right:4px;" onclick="toggleLegal(\''+item.id+'\')">&#8635;</button><button class="task-del" style="opacity:1;" onclick="delLegal(\''+item.id+'\')">&#10005;</button></td></tr>';});
  h+='</tbody></table>'+buildNotes(id,'Legal Notes &amp; Contacts');
  return h;
}
function addLegal(){openModal('Add Legal Item','<div class="form-group"><label class="form-label">Item</label><input class="form-input" id="lgName" placeholder="e.g. LLC Registration, ASCAP License"></div><div class="form-group"><label class="form-label">Category</label><input class="form-input" id="lgCat" placeholder="e.g. License, Insurance, Contract"></div><div class="form-group"><label class="form-label">Renewal Date (if any)</label><input type="date" class="form-input" id="lgRenewal"></div>',()=>{const n=document.getElementById('lgName').value.trim();if(!n)return;if(!pillarData['legal'].items)pillarData['legal'].items=[];pillarData['legal'].items.push({id:'lg'+Date.now(),name:n,cat:document.getElementById('lgCat').value.trim(),renewal:document.getElementById('lgRenewal').value,done:false});save('legal',true);renderPillar('legal');closeModal();});}
function toggleLegal(id){const item=(pillarData['legal'].items||[]).find(x=>x.id===id);if(item){item.done=!item.done;save('legal');renderPillar('legal');}}
function delLegal(id){pillarData['legal'].items=(pillarData['legal'].items||[]).filter(x=>x.id!==id);save('legal');renderPillar('legal');}

// SOPs
function buildSOPs(id){
  const d=pillarData[id];if(!d.templates)d.templates=[];
  let h='<div class="section-label">SOP Library <button class="btn-sm btn-gold" style="margin-left:auto;" onclick="addSOP()">+ New SOP</button></div>';
  if(!d.templates.length)h+='<div class="cal-mini-empty">No SOPs yet.<br>Write how you do things once. Reference forever.</div>';
  d.templates.forEach(sop=>{
    h+='<div class="checklist-block"><div class="ct-header" onclick="toggleCT(\'sop-'+sop.id+'\')">'+'<div><div class="ct-name">'+esc(sop.name)+'</div><div class="ct-meta">'+esc(sop.category||'')+'</div></div>'+'<button class="task-del" style="opacity:0.6;" onclick="event.stopPropagation();delSOP(\''+sop.id+'\')">&#10005;</button></div>';
    h+='<div class="ct-body" id="sop-'+sop.id+'"><textarea class="notes-area" style="min-height:140px;" placeholder="Write the SOP here — step by step..." onchange="saveSOPBody(\''+sop.id+'\',this.value)" onblur="saveSOPBody(\''+sop.id+'\',this.value)">'+esc(sop.body||'')+'</textarea></div></div>';
  });
  h+='<div class="section-gap"></div>'+buildNotes(id,'Notes & Ideas');
  return h;
}
function addSOP(){openModal('New SOP','<div class="form-group"><label class="form-label">Title</label><input class="form-input" id="sopName" placeholder="e.g. How to onboard a new host"></div><div class="form-group"><label class="form-label">Category</label><input class="form-input" id="sopCat" placeholder="e.g. Hosting, Finance, Marketing"></div>',()=>{const n=document.getElementById('sopName').value.trim();if(!n)return;if(!pillarData['sops'].templates)pillarData['sops'].templates=[];pillarData['sops'].templates.push({id:'s'+Date.now(),name:n,category:document.getElementById('sopCat').value.trim(),body:''});save('sops',true);renderPillar('sops');closeModal();});}
function delSOP(sid){pillarData['sops'].templates=(pillarData['sops'].templates||[]).filter(x=>x.id!==sid);save('sops');renderPillar('sops');}
function saveSOPBody(sid,v){const s=(pillarData['sops'].templates||[]).find(x=>x.id===sid);if(s){s.body=v;save('sops');}}

// GOALS
function buildGoals(id){
  const d=pillarData[id];if(!d.goals)d.goals=[];
  let h='<div class="section-label">This Week\'s Focus</div>';
  h+='<input type="text" class="form-input" style="margin-bottom:1.2rem;" id="weekFocusInput" placeholder="What are the 3 priorities this week?" value="'+esc(weekFocus)+'" onchange="saveWeekFocusDirect(this.value)" onblur="saveWeekFocusDirect(this.value)">';
  h+='<div class="section-label">Goals &amp; Targets <button class="btn-sm btn-gold" style="margin-left:auto;" onclick="addGoal()">+ Add Goal</button></div>';
  if(!d.goals.length)h+='<div class="cal-mini-empty">No goals set. Add revenue targets, gig counts, follower goals, etc.</div>';
  d.goals.forEach(g=>{
    const pct=g.target>0?Math.min(100,Math.round((g.current/g.target)*100)):0;
    const c=pct>=80?'var(--live)':pct>=50?'var(--gold)':'var(--rose)';
    h+='<div class="goal-card" style="border-left-color:'+c+'"><div class="goal-card-top"><div class="goal-card-name">'+esc(g.name)+(g.period?'<span style="font-size:0.55rem;color:var(--text3);margin-left:0.5rem;">'+esc(g.period)+'</span>':'')+'</div><div class="goal-card-pct" style="color:'+c+'">'+pct+'%</div><button class="goal-del" onclick="delGoal(\''+g.id+'\')">&#10005;</button></div>';
    h+='<div class="goal-bar-wrap"><div class="goal-bar-fill" style="width:'+pct+'%;background:'+c+';"></div></div>';
    h+='<div class="goal-meta"><span>Current: <input type="number" style="background:none;border:none;border-bottom:1px solid var(--border);color:var(--text2);font-size:0.65rem;width:55px;outline:none;" value="'+(g.current||0)+'" onchange="updateGoal(\''+g.id+'\',\'current\',this.value)" onblur="updateGoal(\''+g.id+'\',\'current\',this.value)"></span><span>Target: <input type="number" style="background:none;border:none;border-bottom:1px solid var(--border);color:var(--text2);font-size:0.65rem;width:55px;outline:none;" value="'+(g.target||0)+'" onchange="updateGoal(\''+g.id+'\',\'target\',this.value)" onblur="updateGoal(\''+g.id+'\',\'target\',this.value)"></span></div></div>';
  });
  h+=buildNotes(id,'Strategy Notes');
  return h;
}
function addGoal(){openModal('Add Goal','<div class="form-group"><label class="form-label">Goal Name</label><input class="form-input" id="glName" placeholder="e.g. Monthly Revenue, Gigs per Month, Instagram Followers"></div><div class="form-group"><label class="form-label">Target</label><input type="number" class="form-input" id="glTarget" placeholder="e.g. 5000"></div><div class="form-group"><label class="form-label">Current</label><input type="number" class="form-input" id="glCurrent" placeholder="0"></div><div class="form-group"><label class="form-label">Period</label><input class="form-input" id="glPeriod" placeholder="e.g. Monthly, Q2 2026"></div>',()=>{const n=document.getElementById('glName').value.trim();if(!n)return;if(!pillarData['goals'].goals)pillarData['goals'].goals=[];pillarData['goals'].goals.push({id:'g'+Date.now(),name:n,target:parseFloat(document.getElementById('glTarget').value)||0,current:parseFloat(document.getElementById('glCurrent').value)||0,period:document.getElementById('glPeriod').value.trim()});save('goals',true);renderPillar('goals');closeModal();});}
function updateGoal(gid,field,val){const g=(pillarData['goals'].goals||[]).find(x=>x.id===gid);if(g){g[field]=parseFloat(val)||0;save('goals');renderPillar('goals');}}
function delGoal(gid){pillarData['goals'].goals=(pillarData['goals'].goals||[]).filter(x=>x.id!==gid);save('goals');renderPillar('goals');}
function saveWeekFocusDirect(v){weekFocus=v;LS.set('cc3-weekfocus',v);cloudSave();const wt=document.getElementById('weekWidgetText');if(wt)wt.textContent=v||'No focus set';}
function saveWeekFocus(){const inp=document.getElementById('wfInput');if(!inp)return;weekFocus=inp.value.trim();LS.set('cc3-weekfocus',weekFocus);cloudSave();closeModal();const wt=document.getElementById('weekWidgetText');if(wt)wt.textContent=weekFocus||'No focus set';const wfi=document.getElementById('weekFocusInput');if(wfi)wfi.value=weekFocus;}

// IDEAS
function buildIdeas(){
  let h='<div class="section-label">Idea Parking Lot</div><div class="inline-add-row"><input class="add-task-input" id="ideaInput" placeholder="Capture an idea..."><button class="btn-sm btn-gold" onclick="addIdea()">+ Add</button></div>';
  h+='<div class="task-list">'+(ideas||[]).map(i=>'<div class="task-row"><div class="task-label">'+esc(i.text)+'</div><div style="font-size:0.55rem;color:var(--text3);margin-left:0.5rem;flex-shrink:0;">'+esc(i.date||'')+'</div><button class="task-del" onclick="delIdea(\''+i.id+'\')">&#10005;</button></div>').join('')+'</div>';
  return h;
}
function addIdea(){const inp=document.getElementById('ideaInput');if(!inp)return;const v=inp.value.trim();if(!v)return;ideas.push({id:'i'+Date.now(),text:v,date:new Date().toISOString().slice(0,10)});inp.value='';LS.set('cc3-ideas',JSON.stringify(ideas));cloudSave();renderPillar('goals');}
function delIdea(id){ideas=ideas.filter(x=>x.id!==id);LS.set('cc3-ideas',JSON.stringify(ideas));cloudSave();renderPillar('goals');}

// PHOTO BOARD
function buildPhotoBoard(id){
  const photos=pillarData[id].photos||[];
  let h='<div class="section-label">Product Board</div><div class="photo-board">';
  photos.forEach(ph=>{h+='<div class="photo-card">'+(ph.url?'<img src="'+esc(ph.url)+'" alt="'+esc(ph.name)+'">':'<div style="width:100%;height:65%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:var(--text3);letter-spacing:0.1em;">No Image</div>')+'<div class="photo-card-body"><div class="photo-card-name">'+esc(ph.name)+'</div>'+(ph.link?'<a href="'+esc(ph.link)+'" target="_blank" class="photo-card-link">'+esc(ph.link.replace(/https?:\/\//,'').slice(0,26))+'</a>':'')+'</div><button class="photo-card-del" onclick="delPhoto(\''+id+'\',\''+ph.id+'\')">&#10005;</button></div>';});
  h+='<div class="photo-add-card" onclick="addPhoto(\''+id+'\')">+ Add Product</div></div>';
  return h;
}
function addPhoto(id){openModal('Add Product','<div class="form-group"><label class="form-label">Product Name</label><input class="form-input" id="phName" placeholder="e.g. Rook Enamel Pin"></div><div class="form-group"><label class="form-label">Image URL (optional)</label><input class="form-input" id="phUrl" placeholder="https://..."></div><div class="form-group"><label class="form-label">Shop Link (optional)</label><input class="form-input" id="phLink" placeholder="https://printify.com/..."></div>',()=>{const n=document.getElementById('phName').value.trim();if(!n)return;if(!pillarData[id].photos)pillarData[id].photos=[];pillarData[id].photos.push({id:'ph'+Date.now(),name:n,url:document.getElementById('phUrl').value.trim(),link:document.getElementById('phLink').value.trim()});save(id,true);renderPillar(id);closeModal();});}
function delPhoto(id,pid){pillarData[id].photos=(pillarData[id].photos||[]).filter(x=>x.id!==pid);save(id);renderPillar(id);}

// LINKS
function buildLinks(id,label){
  const links=pillarData[id].links||[];
  let h='<div class="section-label">'+label+'</div><div class="link-list">';
  links.forEach(lnk=>{const tag=lnk.url?'a':'div',extra=lnk.url?'href="'+esc(lnk.url)+'" target="_blank"':'';h+='<'+tag+' class="link-item" '+extra+'><div class="link-item-text"><div class="link-item-title">'+esc(lnk.title)+'</div>'+(lnk.sub?'<div class="link-item-sub">'+esc(lnk.sub)+'</div>':'')+'</div>'+(lnk.url?'<div class="link-item-arrow">&#8250;</div>':'')+'<button class="link-item-del" onclick="event.stopPropagation();event.preventDefault();delLink(\''+id+'\',\''+lnk.id+'\')">&#10005;</button></'+tag+'>';});
  h+='</div><button class="btn-sm" style="margin-bottom:1.1rem;" onclick="addLink(\''+id+'\')">+ Add Link</button>';
  return h;
}
function addLink(id){openModal('Add Link','<div class="form-group"><label class="form-label">Title</label><input class="form-input" id="lnkTitle" placeholder="Link title"></div><div class="form-group"><label class="form-label">URL (optional)</label><input class="form-input" id="lnkUrl" placeholder="https://..."></div><div class="form-group"><label class="form-label">Description</label><input class="form-input" id="lnkSub" placeholder="Short description"></div>',()=>{const t=document.getElementById('lnkTitle').value.trim();if(!t)return;if(!pillarData[id].links)pillarData[id].links=[];pillarData[id].links.push({id:'l'+Date.now(),title:t,url:document.getElementById('lnkUrl').value.trim(),sub:document.getElementById('lnkSub').value.trim()});save(id,true);renderPillar(id);closeModal();});}
function delLink(id,lid){pillarData[id].links=(pillarData[id].links||[]).filter(x=>x.id!==lid);save(id);renderPillar(id);}

// NOTES
function buildNotes(id,label){return'<div class="section-label">'+label+'</div><textarea class="notes-area" placeholder="Notes, ideas, brain dump..." onchange="saveNotes(\''+id+'\',this.value)" onblur="saveNotes(\''+id+'\',this.value)">'+esc(pillarData[id].notes||'')+'</textarea>';}
function saveNotes(id,v){pillarData[id].notes=v;save(id);}

// MODAL
let _cb=null;
function openModal(title,fields,cb){document.getElementById('addItemTitle').textContent=title;document.getElementById('addItemFields').innerHTML=fields;_cb=cb;document.getElementById('addItemModal').classList.add('open');}
function closeModal(){document.getElementById('addItemModal').classList.remove('open');_cb=null;}
function confirmModal(){if(_cb)_cb();}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function init(){updateGreeting();loadAll();renderHome();}
init();
</script>
</body>
</html>
