<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belladonna Command Center</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Josefin+Sans:wght@200;300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#08060a;--surface:#13101a;--surface2:#1a1525;--surface3:#211c2e;--surface4:#2a2438;
  --border:rgba(155,106,191,0.18);--border2:rgba(155,106,191,0.38);--border-gold:rgba(201,168,76,0.35);
  --gold:#c9a84c;--gold2:#e8c96a;--gold-dim:rgba(201,168,76,0.12);
  --purple:#9b6abf;--purple2:#7a4a9a;--purple3:#4a2a6a;--purple-dim:rgba(155,106,191,0.1);
  --rose:#a03858;--teal:#2a8870;--live:#3a9a5a;--live-dim:rgba(58,154,90,0.12);
  --text:#f0eaf8;--text2:#b8a8d0;--text3:#6a5a80;--text4:#3a2a50;
  --purple-btn:#c8b0e8;
  --p-social:#a03858;--p-venue:#2a8870;--p-hosts:#7a4a9a;
  --p-gigs:#c9a84c;--p-music:#9b6abf;--p-merch-shop:#7a4a9a;
  --p-merch-make:#2a8870;--p-events:#a03858;
}
body{background:var(--bg);color:var(--text);font-family:'Josefin Sans',sans-serif;font-weight:300;min-height:100vh;letter-spacing:0.04em;overflow-x:hidden;}

/* HEADER */
.header{background:linear-gradient(180deg,#060408 0%,var(--bg) 100%);border-bottom:2px solid rgba(155,106,191,0.25);padding:1.2rem 1.5rem;position:relative;}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--purple2),var(--gold),var(--purple),transparent);}
.header-top{display:flex;align-items:center;justify-content:space-between;}
.logo-group{display:flex;align-items:center;gap:0.8rem;}
.logo-img{width:44px;height:44px;object-fit:contain;opacity:0.95;flex-shrink:0;}
.logo{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;letter-spacing:0.15em;color:var(--gold);text-transform:uppercase;padding-right:0.15em;}
.logo small{color:var(--text3);font-size:0.98rem;display:block;letter-spacing:0.35em;font-family:'Josefin Sans',sans-serif;font-weight:200;margin-top:-2px;}
.hq-link{display:flex;align-items:center;gap:6px;font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);text-decoration:none;border:1px solid var(--border);padding:0.4rem 0.9rem;transition:all 0.2s;}
.hq-link:hover{border-color:var(--border-gold);color:var(--gold);}

/* HOME BOARD */
#homeScreen{display:flex;flex-direction:column;height:calc(100vh - 76px);overflow:hidden;}
.home-top{padding:1rem 1.5rem 0.5rem;flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;}
.home-greeting-text{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;color:var(--gold);letter-spacing:0.12em;}
.home-greeting-sub{font-size:0.58rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--text3);margin-top:0.15rem;}
.focus-badge{font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--rose);border:1px solid rgba(160,56,88,0.35);padding:0.3rem 0.75rem;white-space:nowrap;flex-shrink:0;}
.focus-badge span{color:var(--text2);}

.board-scroll{flex:1;overflow-x:auto;overflow-y:hidden;padding:0.75rem 1rem 1rem;display:flex;gap:0.6rem;align-items:flex-start;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:rgba(155,106,191,0.2) transparent;}
.board-scroll::-webkit-scrollbar{height:4px;}
.board-scroll::-webkit-scrollbar-track{background:transparent;}
.board-scroll::-webkit-scrollbar-thumb{background:rgba(155,106,191,0.25);}

/* PILLAR COLUMNS */
.pillar-col{background:var(--surface);border:1px solid var(--border);width:200px;min-width:200px;display:flex;flex-direction:column;max-height:100%;overflow:hidden;cursor:pointer;transition:border-color 0.25s,box-shadow 0.25s;flex-shrink:0;position:relative;}
.pillar-col::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.pillar-col:hover{box-shadow:0 4px 28px rgba(0,0,0,0.65);}
.pillar-col.focus-col{border-color:rgba(160,56,88,0.5);box-shadow:0 0 0 1px rgba(160,56,88,0.2);}
.pillar-col-header{padding:0.9rem 0.9rem 0.7rem;flex-shrink:0;}
.pillar-col-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.65rem;}
.pillar-col-name{font-size:0.6rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--text3);line-height:1.4;font-weight:400;flex:1;}
.pillar-col-pct{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:300;line-height:1;}
.pillar-col-bar{height:2px;background:rgba(255,255,255,0.05);overflow:hidden;}
.pillar-col-bar-fill{height:100%;transition:width 0.5s ease;}
.pillar-col-tasks{padding:0.5rem 0.7rem 0.4rem;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:0.28rem;scrollbar-width:none;}
.pillar-col-tasks::-webkit-scrollbar{display:none;}
.pillar-task-chip{background:var(--surface2);border:1px solid rgba(155,106,191,0.08);padding:0.42rem 0.55rem;font-size:0.68rem;color:var(--text2);letter-spacing:0.02em;line-height:1.35;display:flex;align-items:flex-start;gap:0.4rem;}
.pillar-task-chip.done{opacity:0.32;}
.pillar-task-chip.done .chip-text{text-decoration:line-through;}
.pillar-task-dot{width:4px;height:4px;flex-shrink:0;margin-top:5px;}
.pillar-col-more{margin:0 0.7rem 0.4rem;border:1px dashed rgba(155,106,191,0.12);padding:0.35rem 0.55rem;font-size:0.58rem;letter-spacing:0.12em;color:var(--text4);text-align:center;flex-shrink:0;}
.pillar-col-empty{font-size:0.62rem;color:var(--text4);text-align:center;padding:0.9rem 0.5rem;line-height:1.9;letter-spacing:0.04em;}
.col-drag-handle{font-size:0.55rem;color:rgba(155,106,191,0.3);cursor:grab;text-align:center;padding:0.18rem 0;letter-spacing:0.15em;flex-shrink:0;user-select:none;}
.col-drag-handle:hover{color:rgba(201,168,76,0.5);}
.pillar-col.dragging{opacity:0.4;}
.pillar-col.drag-over{border-color:var(--gold) !important;}
.pillar-col-open{font-size:0.5rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text4);padding:0.45rem 0.7rem;border-top:1px solid rgba(155,106,191,0.07);text-align:right;flex-shrink:0;transition:color 0.2s;}
.pillar-col:hover .col-drag-handle{font-size:0.55rem;color:rgba(155,106,191,0.3);cursor:grab;text-align:center;padding:0.18rem 0;letter-spacing:0.15em;flex-shrink:0;user-select:none;}
.col-drag-handle:hover{color:rgba(201,168,76,0.5);}
.pillar-col.dragging{opacity:0.4;}
.pillar-col.drag-over{border-color:var(--gold) !important;}
.pillar-col-open{color:var(--text3);}

/* PILLAR DETAIL SCREEN */
#pillarScreen{display:none;}
.pillar-header{background:var(--surface);border-bottom:2px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:50;position:relative;}
.pillar-header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.back-btn{background:none;border:1px solid var(--border);color:var(--text3);width:34px;height:34px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.back-btn:hover{border-color:var(--gold);color:var(--gold);}
.pillar-header-name{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;letter-spacing:0.12em;color:var(--gold);flex:1;}
.pillar-header-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;}
.pillar-header-pct{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;line-height:1;}
.pillar-header-sub{font-size:0.52rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3);}
.pillar-progress-bar{height:3px;background:var(--surface2);}
.pillar-progress-fill{height:100%;transition:width 0.5s ease;}
.pillar-body{padding:1.5rem;}

/* TRACKER SYNC BADGE */
.tracker-sync-bar{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--purple);padding:0.75rem 1rem;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.tracker-sync-label{font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--text3);}
.tracker-sync-pct{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--purple);font-weight:300;}
.tracker-sync-breakdown{font-size:0.6rem;color:var(--text3);margin-top:2px;letter-spacing:0.04em;}

/* SHARED COMPONENTS */
.section-label{font-size:0.58rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--text3);margin-bottom:0.7rem;display:flex;align-items:center;gap:0.5rem;font-weight:400;}
.section-label::after{content:'';flex:1;height:1px;background:rgba(155,106,191,0.15);}
.btn-sm{background:none;border:1px solid var(--border2);color:var(--purple-btn);padding:0.35rem 0.85rem;font-size:0.6rem;letter-spacing:0.16em;text-transform:uppercase;cursor:pointer;font-family:'Josefin Sans',sans-serif;transition:all 0.2s;font-weight:400;}
.btn-sm:hover{border-color:var(--border-gold);color:var(--gold);}
.btn-gold{background:var(--gold-dim);border:1px solid var(--border-gold);color:var(--gold);}
.btn-gold:hover{background:rgba(201,168,76,0.2);}
.save-dot{font-size:0.58rem;color:var(--teal);letter-spacing:0.08em;opacity:0;transition:opacity 0.3s;margin-left:0.4rem;}
.save-dot.show{opacity:1;}

/* TASKS */
.task-list{display:flex;flex-direction:column;gap:0.35rem;margin-bottom:1.2rem;}
.task-row{display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0.85rem;background:var(--surface);border:1px solid var(--border);transition:all 0.2s;cursor:pointer;}
.task-row:hover{border-color:var(--border2);}
.task-row.done{opacity:0.42;}
.task-row.done .task-label{text-decoration:line-through;color:var(--text3);}
.task-check{width:16px;height:16px;border:1px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.6rem;transition:all 0.2s;background:none;}
.task-row.done .task-check{background:rgba(58,154,90,0.2);border-color:var(--live);color:var(--live);}
.task-label{font-size:0.82rem;color:var(--text2);flex:1;line-height:1.4;letter-spacing:0.02em;}
.task-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.7rem;padding:2px 4px;opacity:0;transition:opacity 0.2s;}
.task-row:hover .task-del{opacity:1;}
.task-del:hover{color:var(--rose);}
.add-task-row{display:flex;gap:0.5rem;margin-bottom:1.5rem;}
.add-task-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:0.55rem 0.85rem;font-size:0.82rem;font-family:'Josefin Sans',sans-serif;outline:none;transition:border-color 0.2s;letter-spacing:0.03em;}
.add-task-input:focus{border-color:var(--gold);}
.add-task-input::placeholder{color:var(--text3);}

/* KANBAN */
.kanban-wrap{display:grid;grid-template-columns:repeat(2,1fr);gap:0.6rem;margin-bottom:1.5rem;}
@media(min-width:600px){.kanban-wrap{grid-template-columns:repeat(4,1fr);}}
.kanban-col{background:var(--surface);border:1px solid var(--border);padding:0.75rem;min-height:120px;}
.kanban-col-title{font-size:0.58rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--text3);margin-bottom:0.6rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border);}
.kanban-item{background:var(--surface2);border:1px solid var(--border);padding:0.5rem 0.65rem;font-size:0.75rem;color:var(--text2);margin-bottom:0.35rem;cursor:pointer;transition:all 0.2s;position:relative;}
.kanban-item:hover{border-color:var(--border2);color:var(--text);}
.kanban-item-del{position:absolute;top:4px;right:6px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.6rem;opacity:0;transition:opacity 0.15s;}
.kanban-item:hover .kanban-item-del{opacity:1;}
.kanban-item-del:hover{color:var(--rose);}
.kanban-add-input{width:100%;background:var(--surface3);border:1px dashed rgba(155,106,191,0.18);color:var(--text2);padding:0.4rem 0.6rem;font-size:0.72rem;font-family:'Josefin Sans',sans-serif;outline:none;margin-top:0.35rem;letter-spacing:0.03em;}
.kanban-add-input:focus{border-color:var(--border2);}
.kanban-add-input::placeholder{color:var(--text3);}

/* PEOPLE */
.people-list{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1.2rem;}
.person-card{background:var(--surface);border:1px solid var(--border);}
.person-header{display:flex;align-items:center;gap:0.75rem;padding:0.85rem 1rem;cursor:pointer;}
.person-avatar{width:32px;height:32px;background:var(--surface3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:0.95rem;color:var(--gold);flex-shrink:0;}
.person-name{font-size:0.85rem;color:var(--text);flex:1;letter-spacing:0.04em;}
.person-status{font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.18rem 0.55rem;}
.status-good{background:var(--live-dim);color:var(--live);border:1px solid rgba(58,154,90,0.3);}
.status-due{background:var(--gold-dim);color:var(--gold);border:1px solid var(--border-gold);}
.status-overdue{background:rgba(160,56,88,0.1);color:var(--rose);border:1px solid rgba(160,56,88,0.3);}
.person-body{display:none;padding:0 1rem 1rem;border-top:1px solid var(--border);}
.person-body.open{display:block;}
.person-note{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:0.55rem 0.75rem;font-size:0.78rem;font-family:'Josefin Sans',sans-serif;outline:none;resize:vertical;min-height:60px;margin-top:0.75rem;line-height:1.6;letter-spacing:0.02em;}
.person-note:focus{border-color:var(--gold);}
.person-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.68rem;padding:2px;margin-left:4px;transition:color 0.2s;}
.person-del:hover{color:var(--rose);}

/* PHOTO BOARD */
.photo-board{display:grid;grid-template-columns:repeat(2,1fr);gap:0.5rem;margin-bottom:1.2rem;}
@media(min-width:480px){.photo-board{grid-template-columns:repeat(3,1fr);}}
.photo-card{background:var(--surface);border:1px solid var(--border);overflow:hidden;position:relative;aspect-ratio:1;cursor:pointer;transition:all 0.2s;}
.photo-card:hover{border-color:var(--border2);}
.photo-card img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-card-body{padding:0.5rem 0.6rem;}
.photo-card-name{font-size:0.7rem;color:var(--text2);letter-spacing:0.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.photo-card-link{font-size:0.58rem;color:var(--teal);letter-spacing:0.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:none;}
.photo-card-link:hover{color:var(--gold);}
.photo-card-del{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.8);border:1px solid var(--border);color:var(--text3);width:20px;height:20px;cursor:pointer;font-size:0.6rem;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;}
.photo-card:hover .photo-card-del{opacity:1;}
.photo-card-del:hover{color:var(--rose);}
.photo-add-card{background:var(--surface2);border:1px dashed rgba(155,106,191,0.2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;aspect-ratio:1;}
.photo-add-card:hover{border-color:var(--border2);}
.photo-add-label{font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--text3);}

/* CALENDAR MINI */
.cal-mini-list{display:flex;flex-direction:column;gap:0.35rem;margin-bottom:1.2rem;}
.cal-mini-item{display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0.85rem;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--gold);}
.cal-mini-date{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--gold);flex-shrink:0;min-width:36px;}
.cal-mini-info{flex:1;}
.cal-mini-title{font-size:0.8rem;color:var(--text2);}
.cal-mini-venue{font-size:0.62rem;color:var(--text3);letter-spacing:0.05em;}
.cal-mini-empty{text-align:center;padding:1.5rem;color:var(--text3);font-size:0.75rem;letter-spacing:0.1em;line-height:2;border:1px dashed rgba(155,106,191,0.12);}

/* LINKS */
.link-list{display:flex;flex-direction:column;gap:0.35rem;margin-bottom:1.2rem;}
.link-item{display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0.85rem;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--gold);text-decoration:none;transition:all 0.2s;cursor:pointer;}
.link-item:hover{border-color:var(--border2);}
.link-item-text{flex:1;}
.link-item-title{font-size:0.8rem;color:var(--gold);letter-spacing:0.04em;}
.link-item-sub{font-size:0.62rem;color:var(--text3);}
.link-item-arrow{color:var(--text3);font-size:0.75rem;}
.link-item:hover .link-item-arrow{color:var(--gold);}
.link-item-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.7rem;padding:2px 4px;opacity:0;transition:opacity 0.2s;}
.link-item:hover .link-item-del{opacity:1;}
.link-item-del:hover{color:var(--rose);}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-top:3px solid var(--gold);padding:1.6rem;width:100%;max-width:440px;position:relative;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--text3);margin-bottom:1.1rem;font-weight:400;}
.form-group{margin-bottom:0.9rem;}
.form-label{font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:0.4rem;font-weight:400;}
.form-input,.form-textarea,.form-select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:0.6rem 0.85rem;font-size:0.85rem;font-family:'Josefin Sans',sans-serif;letter-spacing:0.04em;outline:none;transition:border-color 0.2s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--gold);}
.form-input::placeholder,.form-textarea::placeholder{color:var(--text3);}
.form-textarea{resize:vertical;min-height:70px;line-height:1.6;}
.form-select{cursor:pointer;-webkit-appearance:none;}
.form-select option{background:var(--surface2);}
.modal-actions{display:flex;gap:0.5rem;margin-top:1.1rem;}
.modal-save{flex:1;background:var(--gold-dim);border:1px solid var(--border-gold);color:var(--purple-btn);padding:0.65rem;font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;cursor:pointer;font-family:'Josefin Sans',sans-serif;transition:all 0.2s;}
.modal-save:hover{background:rgba(201,168,76,0.2);color:var(--text);}
.modal-cancel{background:none;border:1px solid var(--border);color:var(--text3);padding:0.65rem 1.1rem;font-size:0.65rem;letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;font-family:'Josefin Sans',sans-serif;}
.modal-cancel:hover{border-color:var(--rose);color:var(--rose);}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo-group">
      <img src="logo.png" alt="Belladonna" class="logo-img">
      <div class="logo">Belladonna<small>Command Center</small></div>
    </div>
    <a href="hq.html" class="hq-link">← HQ</a>
  </div>
</div>

<div id="homeScreen">
  <div class="home-top">
    <div>
      <div class="home-greeting-text" id="greetingText">Good evening.</div>
      <div class="home-greeting-sub">What needs attention?</div>
    </div>
    <div class="focus-badge" id="focusBadge" style="display:none;">Focus: <span id="focusPillarName">—</span></div>
  </div>
  <div class="board-scroll" id="pillarsGrid" ondragover="event.preventDefault()"></div>
</div>

<div id="pillarScreen">
  <div class="pillar-header" id="pillarHeader">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="pillar-header-name" id="phName"></div>
    <div class="pillar-header-right">
      <div class="pillar-header-pct" id="phPct"></div>
      <div class="pillar-header-sub">combined score</div>
    </div>
  </div>

// ── PROGRESS CALC ──
// CC-only progress (tasks/kanban/people)
function calcCCProgress(pillarId) {
  const d = pillarData[pillarId]; if(!d) return 0;
  let total=0, done=0;
  (d.tasks||[]).forEach(t=>{total++;if(t.done)done++;});
  if(d.kanban){['lead','contacted','active','won'].forEach((col,i)=>{(d.kanban[col]||[]).forEach(()=>{total++;if(i>=2)done++;});});}
  (d.people||[]).forEach(p=>{total++;if(p.status==='good')done++;});
  if(total===0) return null; // null = no data
  return Math.round((done/total)*100);
}

// Tracker-only progress for categories linked to this pillar
function calcTrackerProgress(pillarId) {
  const catIds = PILLAR_TRACKER_MAP[pillarId] || [];
  if(!catIds.length || !trackerCategories.length) return null;
  let totalScore=0, totalItems=0;
  catIds.forEach(catId => {
    const cat = trackerCategories.find(c=>c.id===catId);
    if(!cat) return;
    cat.items.forEach(item => {
      const ans = trackerAnswers[catId+'_'+item.id];
      totalItems++;
      if(ans==='yes') totalScore+=1;
      else if(ans==='partial') totalScore+=0.5;
    });
  });
  if(totalItems===0) return null;
  return Math.round((totalScore/totalItems)*100);
}

// Combined: weighted average of CC tasks + tracker answers
function calcCombinedProgress(pillarId) {
  const cc = calcCCProgress(pillarId);
  const tr = calcTrackerProgress(pillarId);
  if(cc===null && tr===null) return 0;
  if(cc===null) return tr;   // no tasks yet — show tracker score as-is
  if(tr===null) return cc;   // no tracker data — show task score as-is
  return Math.round((cc + tr) / 2);
}

// Find the pillar with the lowest combined score (the one to focus on)
function getFocusPillar() {
  let lowest = null, lowestPct = 101;
  PILLARS.forEach(p => {
    const pct = calcCombinedProgress(p.id);
    if(pct < lowestPct) { lowestPct = pct; lowest = p; }
  });
  return lowest;
}

    '</div>';
  });

  if(done.length) {
    h += '<div style="font-size:0.55rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--text3);padding:0.5rem 0.2rem 0.3rem;">' + done.length + ' completed in tracker</div>';
  }

  return h;
}

function cycleTrackerItem(compositeId) {
  // compositeId = catId_itemId
  const current = trackerAnswers[compositeId] || 'no';
  const cycle = {no:'partial', partial:'yes', yes:'no'};
  trackerAnswers[compositeId] = cycle[current];
  // save to localStorage and Firebase (same format as HQ tracker)
  try{localStorage.setItem('tracker-answers', JSON.stringify(trackerAnswers));}catch(e){}
  if(db){
    db.collection('tracker_data').doc('state').set({
      answers: trackerAnswers,
      updatedAt: Date.now()
    }, {merge:true}).catch(()=>{});
  }
  if(currentPillarId) renderPillar(currentPillarId);
  renderHome();
}

// ── TASKS ──
function buildTasksHTML(id) {
  const tasks = pillarData[id].tasks || [];
  const incomplete = tasks.filter(t=>!t.done);
  const complete = tasks.filter(t=>t.done);
  let html = '<div class="section-label">To-Do</div>';
  html += '<div class="add-task-row"><input type="text" class="add-task-input" id="newTaskInput" placeholder="Add a task..." onkeydown="if(event.key===\'Enter\')addTask(\''+id+'\')"><button class="btn-sm btn-gold" onclick="addTask(\''+id+'\')">+ Add</button></div>';
  html += '<div class="task-list" id="taskList">';
  incomplete.forEach(t => { html += taskRowHTML(id,t); });
  if(complete.length>0){
    html += '<div style="font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);padding:0.4rem 0.2rem;margin-top:0.3rem;">Completed ('+complete.length+')</div>';
    complete.forEach(t => { html += taskRowHTML(id,t); });
  }
  html += '</div>';
  return html;
}

function taskRowHTML(pillarId, t) {
  return '<div class="task-row'+(t.done?' done':'')+'" id="task-'+t.id+'" onclick="toggleTask(\''+pillarId+'\',\''+t.id+'\')">' +
    '<div class="task-check">'+(t.done?'✓':'')+'</div>'+
    '<div class="task-label">'+escHtml(t.label)+'</div>'+
    '<button class="task-del" onclick="event.stopPropagation();deleteTask(\''+pillarId+'\',\''+t.id+'\')">✕</button>'+
  '</div>';
}

function addTask(pillarId) {
  const inp = document.getElementById('newTaskInput'); if(!inp) return;
  const label = inp.value.trim(); if(!label) return;
  pillarData[pillarId].tasks.push({id:'t'+Date.now(), label, done:false});
  inp.value = '';
  save(pillarId, true); renderPillar(pillarId);
}
function toggleTask(pillarId, taskId) {
  const t = pillarData[pillarId].tasks.find(x=>x.id===taskId);
  if(t){t.done=!t.done; save(pillarId); renderPillar(pillarId);}
}
function deleteTask(pillarId, taskId) {
  pillarData[pillarId].tasks = pillarData[pillarId].tasks.filter(x=>x.id!==taskId);
  save(pillarId); renderPillar(pillarId);
}

// ── KANBAN ──
function buildKanbanHTML(id) {
  const k = pillarData[id].kanban || {lead:[],contacted:[],active:[],won:[]};
  const cols = [{key:'lead',label:'Lead',color:'var(--text3)'},{key:'contacted',label:'Contacted',color:'var(--gold)'},{key:'active',label:'Active',color:'var(--teal)'},{key:'won',label:'Won',color:'var(--live)'}];
  let html = '<div class="section-label">Venue Pipeline</div><div class="kanban-wrap">';
  cols.forEach(col => {
    html += '<div class="kanban-col"><div class="kanban-col-title" style="color:'+col.color+'">'+col.label+' ('+(k[col.key]||[]).length+')</div>';
    (k[col.key]||[]).forEach(item => {
      html += '<div class="kanban-item" ondblclick="moveKanban(\''+id+'\',\''+col.key+'\',\''+item.id+'\')">'+escHtml(item.name)+'<button class="kanban-item-del" onclick="event.stopPropagation();deleteKanban(\''+id+'\',\''+col.key+'\',\''+item.id+'\')">✕</button></div>';
    });
    html += '<input type="text" class="kanban-add-input" placeholder="+ Add..." data-col="'+col.key+'" onkeydown="if(event.key===\'Enter\')addKanban(\''+id+'\',this)"></div>';
  });
  html += '</div><div style="font-size:0.6rem;color:var(--text3);margin-bottom:1.2rem;letter-spacing:0.05em;">Double-tap a card to advance to next stage</div>';
  return html;
}
function addKanban(pillarId, input) {
  const name=input.value.trim();if(!name)return;
  const col=input.dataset.col;
  if(!pillarData[pillarId].kanban[col])pillarData[pillarId].kanban[col]=[];
  pillarData[pillarId].kanban[col].push({id:'k'+Date.now(),name});
  input.value=''; save(pillarId); renderPillar(pillarId);
}
function deleteKanban(pillarId,col,itemId){
  pillarData[pillarId].kanban[col]=(pillarData[pillarId].kanban[col]||[]).filter(x=>x.id!==itemId);
  save(pillarId);renderPillar(pillarId);
}
function moveKanban(pillarId,fromCol,itemId){
  const order=['lead','contacted','active','won'];
  const fi=order.indexOf(fromCol);if(fi===-1||fi===order.length-1)return;
  const toCol=order[fi+1];
  const item=(pillarData[pillarId].kanban[fromCol]||[]).find(x=>x.id===itemId);if(!item)return;
  pillarData[pillarId].kanban[fromCol]=pillarData[pillarId].kanban[fromCol].filter(x=>x.id!==itemId);
  if(!pillarData[pillarId].kanban[toCol])pillarData[pillarId].kanban[toCol]=[];
  pillarData[pillarId].kanban[toCol].push(item);
  save(pillarId);renderPillar(pillarId);
}

function buildGigsCalHTML() {
  const now = new Date();
  const upcoming = calEntries.filter(e=>e.type==='event'&&e.date>=now.toISOString().slice(0,10)).sort((a,b)=>a.date>b.date?1:-1).slice(0,10);

  html += '<div class="cal-mini-list">';

    html += '<div class="cal-mini-empty">No upcoming gigs found.<br>Add events in the HQ Calendar tab.<br><a href="hq.html" style="color:var(--teal);text-decoration:none;font-size:0.68rem;letter-spacing:0.08em;">Open HQ</a></div>';
  } else {

// DRAG TO REORDER
let _dragSrcId=null,_dragOverId=null;
function colDragStart(e,el){
  _dragSrcId=el.dataset.id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',_dragSrcId);
  el.classList.add('dragging');
}
function colDragOver(e,el){
  e.preventDefault();e.stopPropagation();
  e.dataTransfer.dropEffect='move';
  let col=el;while(col&&!col.dataset.id)col=col.parentElement;
  if(!col||!col.dataset.id)return;
  if(col.dataset.id===_dragOverId)return;
  document.querySelectorAll('.pillar-col').forEach(c=>c.classList.remove('drag-over'));
  col.classList.add('drag-over');
  _dragOverId=col.dataset.id;
}
function colDragDrop(e,el){
  e.preventDefault();e.stopPropagation();
  let col=el;while(col&&!col.dataset.id)col=col.parentElement;
  const targetId=col?col.dataset.id:null;
  if(!_dragSrcId||!targetId||_dragSrcId===targetId)return;
  const ids=getOrderedPillars().map(p=>p.id);
  const fi=ids.indexOf(_dragSrcId),ti=ids.indexOf(targetId);
  if(fi===-1||ti===-1)return;
  ids.splice(fi,1);ids.splice(ti,0,_dragSrcId);
  pillarOrder=ids;
  LS.set('cc3-order',JSON.stringify(ids));
  if(db)db.collection('command_center').doc('pillars').set({_order:ids},{merge:true}).catch(()=>{});
  colDragEnd();renderHome();
}
function colDragEnd(){
  _dragSrcId=null;_dragOverId=null;
  document.querySelectorAll('.pillar-col').forEach(c=>{c.classList.remove('dragging');c.classList.remove('drag-over');});
}

function init() {
  updateGreeting();
  try{const o=LS.get('cc3-order');if(o)pillarOrder=JSON.parse(o);}catch(e){}
  try{const id=LS.get('cc3-ideas');if(id)ideas=JSON.parse(id);}catch(e){}
  loadAll();
  renderHome();
}
init();
