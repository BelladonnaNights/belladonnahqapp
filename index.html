<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belladonna Host Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000000; color: #e8e0f0; font-family: 'Josefin Sans', sans-serif; font-weight: 300; min-height: 100vh; padding: 3rem 1.5rem; letter-spacing: 0.04em; }
  .wrap { max-width: 420px; margin: 0 auto; text-align: center; }

  .logo-img {
    width: 180px;
    height: auto;
    margin: 0 auto 1rem;
    display: block;
    opacity: 0.95;
  }

  .brand { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; font-weight: 300; color: #c9a96e; letter-spacing: 0.2em; text-transform: uppercase; padding-right: 0.2em; }
  .sub { font-size: 0.58rem; letter-spacing: 0.55em; text-transform: uppercase; color: #6a5a7a; margin-top: 0.3rem; margin-bottom: 0.5rem; }
  .ornament { color: #3a2a4a; font-family: 'Cormorant Garamond', serif; font-size: 1rem; letter-spacing: 0.4em; margin: 1rem 0 2rem; }
  .section-label { font-size: 0.55rem; letter-spacing: 0.4em; text-transform: uppercase; color: #5a4a6a; margin-bottom: 0.9rem; text-align: left; padding-left: 0.2rem; }
  .links { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2rem; }
  .link-card { display: block; background: #111118; border: 1px solid rgba(201,169,110,0.25); border-radius: 12px; padding: 1.2rem 1.5rem; text-decoration: none; transition: all 0.25s; position: relative; overflow: hidden; text-align: left; }
  .link-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, #c9a96e, transparent); }
  .link-card:hover { border-color: rgba(201,169,110,0.5); transform: translateY(-2px); background: rgba(201,169,110,0.04); }
  .link-inner { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
  .link-text { flex: 1; }
  .link-title { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 0.2rem; color: #c9a96e; }
  .link-desc { font-size: 0.62rem; color: #6a5a7a; letter-spacing: 0.04em; line-height: 1.4; }
  .link-arrow { color: #6a5a7a; font-size: 0.8rem; flex-shrink: 0; transition: color 0.2s; }
  .link-card:hover .link-arrow { color: #c9a96e; }
  .footer { font-size: 0.55rem; letter-spacing: 0.2em; color: #3a2a4a; margin-top: 2.5rem; text-transform: uppercase; }
</style>
</head>
<body>
<div class="wrap">
  <img src="logo.png" alt="Belladonna Audio Alchemies" class="logo-img">
  <div class="brand">Belladonna</div>
  <div class="sub">Host Hub</div>
  <div class="ornament">✦ ✦ ✦</div>

  <div class="section-label">Your Shift</div>
  <div class="links">
    <a href="checkin.html" class="link-card">
      <div class="link-inner">
        <div class="link-text">
          <div class="link-title">Check-In</div>
          <div class="link-desc">Sign in at the start of your shift</div>
        </div>
        <div class="link-arrow">›</div>
      </div>
    </a>
    <a href="checkout.html" class="link-card">
      <div class="link-inner">
        <div class="link-text">
          <div class="link-title">Check-Out</div>
          <div class="link-desc">Complete your end of shift report</div>
        </div>
        <div class="link-arrow">›</div>
      </div>
    </a>
  </div>

  <div class="section-label">Tools & Games</div>
  <div class="links">
    <a href="https://belladonnanights.github.io/bingo/index.html" class="link-card" target="_blank">
      <div class="link-inner">
        <div class="link-text">
          <div class="link-title">Music Bingo</div>
          <div class="link-desc">Launch the Belladonna Bingo experience</div>
        </div>
        <div class="link-arrow">›</div>
      </div>
    </a>
  </div>

  <div class="footer">Belladonna Audio Alchemies &nbsp;✦&nbsp; Host Hub</div>
</div>
</body>
</html>
