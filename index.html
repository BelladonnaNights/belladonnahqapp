<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belladonna Host Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e8e0f0; font-family: 'Josefin Sans', sans-serif; font-weight: 300; min-height: 100vh; padding: 3rem 1.5rem; letter-spacing: 0.04em; }
  .wrap { max-width: 420px; margin: 0 auto; text-align: center; }
  .brand { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; font-weight: 300; color: #c9a96e; letter-spacing: 0.3em; text-transform: uppercase; }
  .sub { font-size: 0.58rem; letter-spacing: 0.55em; text-transform: uppercase; color: #6a5a7a; margin-top: 0.3rem; margin-bottom: 0.5rem; }
  .ornament { color: #3a2a4a; font-family: 'Cormorant Garamond', serif; font-size: 1rem; letter-spacing: 0.4em; margin: 1rem 0 2rem; }
  .section-label { font-size: 0.55rem; letter-spacing: 0.4em; text-transform: uppercase; color: #5a4a6a; margin-bottom: 0.9rem; text-align: left; padding-left: 0.2rem; }
  .links { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2rem; }
  .link-card { display: block; background: #111118; border: 1px solid rgba(180,140,200,0.12); border-radius: 12px; padding: 1.2rem 1.5rem; text-decoration: none; transition: all 0.25s; position: relative; overflow: hidden; text-align: left; }
  .link-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; }
  .link-card.gold::before { background: linear-gradient(90deg, transparent, #c9a96e, transparent); }
  .link-card.rose::before { background: linear-gradient(90deg, transparent, #b05070, transparent); }
  .link-card.purple::before { background: linear-gradient(90deg, transparent, #7a5aaa, transparent); }
  .link-card.teal::before { background: linear-gradient(90deg, transparent, #3aa08a, transparent); }
  .link-card:hover { border-color: rgba(180,140,200,0.28); transform: translateY(-2px); }
  .link-inner { display: flex; align-items: center; gap: 1rem; }
  .link-icon { font-size: 1.1rem; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .link-icon.gold { background: rgba(201,169,110,0.12); }
  .link-icon.rose { background: rgba(176,80,112,0.12); }
  .link-icon.purple { background: rgba(122,90,170,0.12); }
  .link-icon.teal { background: rgba(58,160,138,0.12); }
  .link-icon.pink { background: rgba(200,80,140,0.12); }
  .link-text { flex: 1; }
  .link-title { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 0.2rem; }
  .link-card.gold .link-title { color: #c9a96e; }
  .link-card.rose .link-title { color: #b05070; }
  .link-card.purple .link-title { color: #9a7aca; }
  .link-card.teal .link-title { color: #3aa08a; }
  .link-desc { font-size: 0.62rem; color: #6a5a7a; letter-spacing: 0.04em; line-height: 1.4; }
  .arrow { color: #3a2a4a; font-size: 0.8rem; flex-shrink: 0; transition: color 0.2s; }
  .link-card:hover .arrow { color: #6a5a7a; }
  .footer { font-size: 0.55rem; letter-spacing: 0.2em; color: #3a2a4a; margin-top: 2.5rem; text-transform: uppercase; }

  /* Colored SVG icons inline */
  .icon-diamond { display: inline-block; width: 18px; height: 18px; }
  .icon-hex { display: inline-block; width: 18px; height: 18px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">Belladonna</div>
  <div class="sub">Host Hub</div>
  <div class="ornament">✦ ✦ ✦</div>

  <div class="section-label">Your Shift</div>
  <div class="links">
    <a href="checkin.html" class="link-card gold">
      <div class="link-inner">
        <div class="link-icon gold">🌙</div>
        <div class="link-text">
          <div class="link-title">Check-In</div>
          <div class="link-desc">Sign in at the start of your shift</div>
        </div>
        <div class="arrow">›</div>
      </div>
    </a>
    <a href="checkout.html" class="link-card rose">
      <div class="link-inner">
        <div class="link-icon rose">
          <!-- Pink diamond ✦ -->
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 1L11.5 7.5H17L12.5 11.5L14.5 18L9 14L3.5 18L5.5 11.5L1 7.5H6.5L9 1Z" fill="#d06090" opacity="0.9"/>
          </svg>
        </div>
        <div class="link-text">
          <div class="link-title">Check-Out</div>
          <div class="link-desc">Complete your end of shift report</div>
        </div>
        <div class="arrow">›</div>
      </div>
    </a>
  </div>

  <div class="section-label">Tools & Games</div>
  <div class="links">
    <a href="https://musicbingo.belladonnaaudioalchemies.com" class="link-card teal" target="_blank">
      <div class="link-inner">
        <div class="link-icon teal">🎵</div>
        <div class="link-text">
          <div class="link-title">Music Bingo</div>
          <div class="link-desc">Launch the Belladonna Bingo experience</div>
        </div>
        <div class="arrow">›</div>
      </div>
    </a>
  </div>

  <div class="section-label">Admin</div>
  <div class="links">
    <a href="hq.html" class="link-card purple">
      <div class="link-inner">
        <div class="link-icon purple">
          <!-- Purple hexagon -->
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 1L16.5 5V13L9 17L1.5 13V5L9 1Z" fill="#8a5acc" opacity="0.9"/>
          </svg>
        </div>
        <div class="link-text">
          <div class="link-title">Belladonna HQ</div>
          <div class="link-desc">Dashboard, records & host log</div>
        </div>
        <div class="arrow">›</div>
      </div>
    </a>
  </div>

  <div class="footer">Belladonna Audio Alchemies &nbsp;✦&nbsp; Host Portal</div>
</div>
</body>
</html>
